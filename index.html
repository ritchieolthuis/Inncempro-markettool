<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inncempro Database & Search</title>

    <!-- App-icoon: favicon in de browser-tab, apple-touch-icon voor "Zet op beginscherm"
         op iOS, en het manifest voor Android/Chrome zodat de PWA het scherpe logo gebruikt
         in plaats van de automatische letter-fallback ("I"). -->
    <link rel="icon" type="image/x-icon" href="%BASE_URL%favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <meta name="theme-color" content="#009FE3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Inncempro" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Open Sans', sans-serif;
        background-color: #f1f5f9;
      }
      .font-sans { font-family: 'Open Sans', sans-serif; }
      h1, h2, h3, h4, h5, h6, .font-condensed { font-family: 'Oswald', sans-serif; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      .text-inncempro-orange { color: #E85E26; }
      .bg-inncempro-orange { background-color: #E85E26; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
      @keyframes ringRotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-ring-rotate { animation: ringRotate 6s linear infinite; }
      .animate-ring-rotate-fast { animation: ringRotate 1.4s linear infinite; }
      @keyframes orbGlow {
        0%, 100% { transform: scale(1); opacity: 0.45; }
        50% { transform: scale(1.18); opacity: 0.8; }
      }
      .animate-orb-glow { animation: orbGlow 2.6s ease-in-out infinite; }
      @keyframes statusFade {
        from { opacity: 0; transform: translateY(3px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-status-fade { animation: statusFade 0.3s ease-out forwards; }

      /* Leaflet-popups gebruikten de kale library-default (vierkant, harde schaduw) — dit
         laat ze aansluiten bij de rest van de UI (afgeronde kaarten, zachte schaduw). */
      .leaflet-popup-content-wrapper {
        border-radius: 14px !important;
        box-shadow: 0 12px 32px -8px rgba(15, 23, 42, 0.25) !important;
        padding: 2px !important;
      }
      .leaflet-popup-content { margin: 14px 16px !important; }
      .leaflet-popup-tip-container { display: none !important; }
      .leaflet-popup-close-button {
        top: 6px !important;
        right: 6px !important;
        width: 24px !important;
        height: 24px !important;
        display: flex !important;
        align-items: center;
        justify-content: center;
        border-radius: 999px !important;
        color: #94a3b8 !important;
        font-size: 18px !important;
        transition: background-color 0.15s, color 0.15s;
      }
      .leaflet-popup-close-button:hover { background: #f1f5f9; color: #1e293b !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
